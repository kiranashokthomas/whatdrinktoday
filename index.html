<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>What Drink Today?</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#fff;font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden}.felt{background:radial-gradient(ellipse at center,#0a3d1a 0%,#051a0a 100%);min-height:100vh;position:relative}.felt::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,80,20,0.05) 2px,rgba(0,80,20,0.05) 4px);pointer-events:none;z-index:0}h1.title{text-align:center;font-size:2.8em;color:#d4af37;text-shadow:0 0 20px #d4af37,0 0 40px rgba(212,175,55,0.5);padding:30px 0 5px;position:relative;z-index:1;letter-spacing:3px}p.subtitle{text-align:center;color:#888;font-style:italic;margin-bottom:5px;position:relative;z-index:1}p.tagline{text-align:center;color:#d4af37;font-style:italic;font-size:0.9em;margin-bottom:25px;position:relative;z-index:1;letter-spacing:2px}.game-select{display:flex;justify-content:center;gap:20px;margin-bottom:30px;position:relative;z-index:1}.game-btn{padding:14px 40px;border-radius:4px;border:2px solid #d4af37;font-family:'Georgia',serif;font-size:1em;cursor:pointer;transition:all 0.3s;letter-spacing:1px;text-transform:uppercase}.game-btn.active{background:linear-gradient(135deg,#d4af37,#b8860b);color:#000;box-shadow:0 0 20px rgba(212,175,55,0.5)}.game-btn:not(.active){background:transparent;color:#d4af37}.drink-picker{max-width:800px;margin:0 auto 30px;padding:0 20px;position:relative;z-index:1}.drink-picker h3{text-align:center;color:#d4af37;margin-bottom:15px;font-size:1.1em;letter-spacing:2px;text-transform:uppercase}.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}.chip{padding:8px 18px;border-radius:25px;border:1px solid rgba(212,175,55,0.4);background:rgba(212,175,55,0.05);color:#ccc;cursor:pointer;transition:all 0.3s;font-size:0.9em}.chip.selected{border-color:#d4af37;background:rgba(212,175,55,0.2);color:#d4af37;box-shadow:0 0 10px rgba(212,175,55,0.3)}.roulette-section{display:flex;flex-direction:column;align-items:center;position:relative;z-index:1;margin-bottom:30px}.wheel-wrap{position:relative;width:320px;height:320px;margin:0 auto 20px}.wheel-outer{width:320px;height:320px;border-radius:50%;border:8px solid #d4af37;box-shadow:0 0 30px rgba(212,175,55,0.5),inset 0 0 30px rgba(0,0,0,0.5);position:relative;overflow:hidden}.wheel-canvas{width:100%;height:100%;border-radius:50%}#wheel-canvas{display:block}.ball{position:absolute;width:14px;height:14px;background:radial-gradient(circle at 35% 35%,#fff,#ccc);border-radius:50%;box-shadow:0 0 8px rgba(255,255,255,0.8),0 2px 4px rgba(0,0,0,0.5);top:10px;left:50%;transform:translateX(-50%);transition:none}.wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:radial-gradient(circle,#d4af37,#8b6914);border-radius:50%;border:3px solid #000;z-index:3;display:flex;align-items:center;justify-content:center;font-size:1.2em}.spin-btn{margin-top:10px;padding:16px 60px;background:linear-gradient(135deg,#d4af37,#8b6914);border:none;border-radius:4px;color:#000;font-family:'Georgia',serif;font-size:1.2em;font-weight:bold;cursor:pointer;letter-spacing:2px;text-transform:uppercase;box-shadow:0 4px 20px rgba(212,175,55,0.4);transition:all 0.3s}.spin-btn:hover{transform:translateY(-2px);box-shadow:0 6px 25px rgba(212,175,55,0.6)}.spin-btn:disabled{background:#333;color:#666;cursor:not-allowed;transform:none;box-shadow:none}.status-board{background:rgba(0,0,0,0.6);border:1px solid rgba(212,175,55,0.3);border-radius:8px;padding:20px 30px;text-align:center;margin:15px auto;max-width:500px;min-height:80px}.status-board .round-label{color:#888;font-size:0.85em;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}.status-board .result-text{font-size:1.3em;color:#d4af37;min-height:30px}.round-tracker{display:flex;justify-content:center;gap:15px;margin:15px 0}.round-dot{width:20px;height:20px;border-radius:50%;border:2px solid rgba(212,175,55,0.4);transition:all 0.5s}.round-dot.win{background:#d4af37;border-color:#d4af37;box-shadow:0 0 10px #d4af37}.round-dot.pending{background:transparent}.winner-reveal{text-align:center;padding:25px;margin:20px auto;max-width:500px;background:linear-gradient(135deg,rgba(212,175,55,0.1),rgba(139,105,20,0.1));border:2px solid #d4af37;border-radius:8px;animation:revealIn 0.6s ease;display:none}.winner-reveal.show{display:block}.winner-reveal .crown{font-size:3em;display:block;margin-bottom:10px}.winner-reveal h2{color:#d4af37;font-size:1.8em;margin-bottom:5px}.winner-reveal p{color:#ccc;margin-bottom:15px}.winner-reveal .recipe-link{padding:10px 30px;background:transparent;border:1px solid #d4af37;color:#d4af37;border-radius:4px;cursor:pointer;font-family:'Georgia',serif;margin-right:10px;transition:all 0.3s}.winner-reveal .recipe-link:hover{background:rgba(212,175,55,0.1)}.winner-reveal .play-again{padding:10px 30px;background:linear-gradient(135deg,#d4af37,#8b6914);border:none;border-radius:4px;color:#000;font-family:'Georgia',serif;cursor:pointer;transition:all 0.3s}.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:100;justify-content:center;align-items:center;padding:20px}.modal-overlay.open{display:flex}.modal-box{background:linear-gradient(135deg,#0a1a08,#0d250b);border:1px solid rgba(212,175,55,0.4);border-radius:8px;max-width:480px;width:100%;padding:35px;max-height:80vh;overflow-y:auto;position:relative}.modal-box h2{color:#d4af37;font-size:1.6em;margin-bottom:8px}.modal-box .mdesc{color:#aaa;margin-bottom:20px;font-style:italic}.modal-box h3{color:#d4af37;font-size:1em;letter-spacing:1px;text-transform:uppercase;margin:15px 0 8px}.modal-box ul{list-style:none;padding:0}.modal-box ul li{padding:4px 0;color:#ccc;font-size:0.9em;border-bottom:1px solid rgba(255,255,255,0.05)}.modal-box ul li::before{content:'◆ ';color:#d4af37;font-size:0.7em}.modal-box ol{padding-left:18px}.modal-box ol li{padding:5px 0;color:#ccc;font-size:0.9em}.close-btn{position:absolute;top:12px;right:15px;background:transparent;border:none;color:#888;font-size:1.5em;cursor:pointer;line-height:1}.close-btn:hover{color:#d4af37}@keyframes revealIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes ballOrbit{from{transform:rotate(0deg) translateX(130px) rotate(0deg)}to{transform:rotate(360deg) translateX(130px) rotate(-360deg)}}.spinning .ball-orbit{animation:ballOrbit 0.3s linear infinite}.gold-divider{width:200px;height:1px;background:linear-gradient(90deg,transparent,#d4af37,transparent);margin:5px auto 20px}.table-border{border:2px solid rgba(212,175,55,0.2);border-radius:12px;padding:20px;margin:0 20px 30px;position:relative;z-index:1}@media(max-width:600px){h1.title{font-size:1.8em}.wheel-wrap{width:260px;height:260px}.wheel-outer{width:260px;height:260px}.spin-btn{padding:14px 40px;font-size:1em}}</style></head><body><div class="felt"><h1 class="title">WHAT DRINK TODAY?</h1><p class="subtitle">The House Always Decides</p><div class="gold-divider"></div><p class="tagline">Play for the love of the game</p><div class="game-select"><button class="game-btn active" id="btn-one" onclick="setMode('one')">Best of One</button><button class="game-btn" id="btn-three" onclick="setMode('three')">Best of Three</button></div><div class="drink-picker"><h3>Choose Your Drinks</h3><div class="chips" id="chips"></div></div><div class="table-border"><div class="roulette-section"><div class="wheel-wrap" id="wheel-wrap"><div class="wheel-outer"><canvas id="wheel-canvas" width="304" height="304"></canvas></div><div class="wheel-center">🎰</div><div class="ball" id="ball"></div></div><button class="spin-btn" id="spin-btn" onclick="doSpin()">SPIN</button></div><div class="status-board"><div class="round-label" id="round-label">Choose your drinks and spin</div><div class="result-text" id="result-text"></div></div><div class="round-tracker" id="round-tracker"></div><div class="winner-reveal" id="winner-reveal"><span class="crown">🏆</span><h2 id="winner-name"></h2><p id="winner-desc"></p><button class="recipe-link" onclick="openRecipe(currentWinner)">See Recipe</button><button class="play-again" onclick="resetGame()">Play Again</button></div></div></div><div class="modal-overlay" id="modal"><div class="modal-box"><button class="close-btn" onclick="closeModal()">&times;</button><h2 id="m-name"></h2><p class="mdesc" id="m-desc"></p><h3>Ingredients</h3><ul id="m-ing"></ul><h3>How to Make It</h3><ol id="m-steps"></ol></div></div><script>const ALL_DRINKS=[{id:'mojito',name:'Mojito',emoji:'🌿',desc:'Fresh mint, rum and lime — refreshing classic',ing:['60ml white rum','30ml fresh lime juice','10 fresh mint leaves','2 tsp caster sugar','Soda water to top','Crushed ice'],steps:['Muddle mint leaves and sugar gently in a tall glass','Add lime juice and stir','Fill glass with crushed ice','Pour in rum and top with soda water','Garnish with mint sprig and lime wheel']},{id:'margarita',name:'Margarita',emoji:'🍹',desc:'Tequila, triple sec and lime on the rocks',ing:['50ml blanco tequila','25ml triple sec','25ml fresh lime juice','Salt for rim','Ice'],steps:['Run lime around glass rim and dip in salt','Fill cocktail shaker with ice','Add tequila, triple sec and lime juice','Shake vigorously for 15 seconds','Strain into prepared glass over ice']},{id:'oldfashioned',name:'Old Fashioned',emoji:'🥃',desc:'Bourbon, bitters and orange — a timeless classic',ing:['60ml bourbon or rye whiskey','2 dashes Angostura bitters','1 sugar cube','Orange peel','1 large ice cube'],steps:['Place sugar cube in glass and saturate with bitters','Add a splash of water and muddle until dissolved','Add the large ice cube','Pour over bourbon and stir gently 30 seconds','Express orange peel over glass and drop in']},{id:'pinacolada',name:'Pina Colada',emoji:'🍍',desc:'Rum, coconut and pineapple — tropical escape',ing:['60ml white rum','60ml coconut cream','120ml pineapple juice','Pineapple slice to garnish','Ice'],steps:['Add rum, coconut cream and pineapple juice to blender','Add two cups of ice','Blend until smooth and creamy','Pour into chilled glass','Garnish with pineapple slice and cocktail cherry']},{id:'gintonic',name:'Gin & Tonic',emoji:'🌼',desc:'Crisp gin with premium tonic over ice',ing:['50ml premium gin','150ml quality tonic water','Lime or lemon slice','Ice cubes'],steps:['Fill a balloon glass or highball with ice','Pour in gin','Gently pour tonic water over a spoon to preserve fizz','Squeeze in lime and drop slice in','Garnish with cucumber or herbs as desired']},{id:'daiquiri',name:'Daiquiri',emoji:'🍋',desc:'Rum and lime — simple, sharp and elegant',ing:['60ml white rum','30ml fresh lime juice','20ml simple syrup','Ice'],steps:['Add all ingredients to a cocktail shaker with ice','Shake hard for 15 seconds','Double strain through fine mesh into a chilled coupe','Garnish with a thin lime wheel','Serve immediately']},{id:'espressomartini',name:'Espresso Martini',emoji:'☕',desc:'Vodka and fresh espresso — wake-up cocktail',ing:['50ml vodka','25ml coffee liqueur (Kahlua)','25ml fresh espresso (cooled slightly)','Ice'],steps:['Pull a fresh espresso shot and allow to cool 1 minute','Add vodka, coffee liqueur and espresso to shaker with ice','Shake very hard for 20 seconds to create foam','Double strain into a chilled martini glass','Garnish with exactly 3 coffee beans']},{id:'negroni',name:'Negroni',emoji:'🍊',desc:'Gin, Campari and vermouth — bold and bitter',ing:['30ml gin','30ml sweet vermouth','30ml Campari','Large ice cube','Orange peel'],steps:['Add gin, vermouth and Campari to a mixing glass with ice','Stir for 30 seconds until well chilled','Strain into a rocks glass over a large ice cube','Take orange peel and express oils over surface','Drop peel in and serve']},{id:'cosmopolitan',name:'Cosmopolitan',emoji:'🌸',desc:'Vodka, cranberry and triple sec — iconic pink drink',ing:['40ml citrus vodka','20ml triple sec','15ml fresh lime juice','30ml cranberry juice','Lime wheel to garnish'],steps:['Chill a martini glass with ice water','Add all ingredients to shaker with ice','Shake well for 15 seconds','Discard ice from glass and strain cocktail in','Garnish with a lime wheel on the rim']},{id:'aperolspritz',name:'Aperol Spritz',emoji:'🌅',desc:'Aperol, prosecco and soda — light and bubbly',ing:['90ml prosecco','60ml Aperol','30ml soda water','Large ice cubes','Orange half-slice'],steps:['Fill a large wine glass with ice cubes','Pour in Aperol first','Add prosecco gently','Splash of soda water on top','Garnish with orange half-slice and serve']},{id:'moscowmule',name:'Moscow Mule',emoji:'🍶',desc:'Vodka and ginger beer with a lime kick',ing:['50ml vodka','120ml ginger beer','15ml fresh lime juice','Lime wedge','Mint sprig','Ice'],steps:['Fill a copper mug (or highball) with ice','Add vodka and lime juice','Top with cold ginger beer','Give a gentle stir','Garnish with lime wedge and fresh mint']},{id:'manhattan',name:'Manhattan',emoji:'🏙️',desc:'Rye whiskey and sweet vermouth — smooth and rich',ing:['60ml rye whiskey','30ml sweet vermouth','2 dashes Angostura bitters','Maraschino cherry to garnish'],steps:['Add whiskey, vermouth and bitters to mixing glass with ice','Stir for 30 seconds (do not shake)','Strain into a chilled coupe or martini glass','No ice in the glass','Garnish with a maraschino cherry']}];let mode='one',selected=[],spinning=false,round=0,roundResults=[],currentWinner=null,wheelAngle=0,ballAngle=0,ballRadius=130,animFrame=null,wheelSize=304;function init(){buildChips();drawWheel();updateUI()}function buildChips(){const c=document.getElementById('chips');c.innerHTML='';ALL_DRINKS.forEach(d=>{const b=document.createElement('button');b.className='chip';b.textContent=d.emoji+' '+d.name;b.onclick=()=>toggleDrink(d.id,b);c.appendChild(b)})}function toggleDrink(id,btn){const i=selected.indexOf(id);if(i>-1){selected.splice(i,1);btn.classList.remove('selected')}else{selected.push(id);btn.classList.add('selected')}drawWheel()}function setMode(m){mode=m;document.getElementById('btn-one').classList.toggle('active',m==='one');document.getElementById('btn-three').classList.toggle('active',m==='three');resetGame()}function drawWheel(){const canvas=document.getElementById('wheel-canvas');const ctx=canvas.getContext('2d');const W=canvas.width,H=canvas.height,cx=W/2,cy=H/2,r=cx-4;ctx.clearRect(0,0,W,H);if(selected.length===0){ctx.fillStyle='#111';ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(212,175,55,0.3)';ctx.font='16px Georgia';ctx.textAlign='center';ctx.fillText('Select drinks above',cx,cy-10);ctx.fillText('to load the wheel',cx,cy+15);return}const sliceAngle=(Math.PI*2)/selected.length;const colors=['#1a4a1a','#0d3b0d','#1f5c1f','#0a2e0a','#163d16','#235723'];selected.forEach((id,i)=>{const d=ALL_DRINKS.find(x=>x.id===id);const start=wheelAngle+i*sliceAngle;const end=start+sliceAngle;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,end);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle='rgba(212,175,55,0.6)';ctx.lineWidth=1.5;ctx.stroke();ctx.save();ctx.translate(cx,cy);ctx.rotate(start+sliceAngle/2);ctx.textAlign='right';ctx.fillStyle='#d4af37';ctx.font='bold 13px Georgia';const label=d.emoji+' '+d.name;ctx.fillText(label,r-10,4);ctx.restore()});ctx.beginPath();ctx.arc(cx,cy,25,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#d4af37';ctx.lineWidth=2;ctx.stroke()}function getBallPos(){const canvas=document.getElementById('wheel-canvas');const W=canvas.width,cx=W/2,cy=W/2;const x=cx+ballRadius*Math.cos(ballAngle);const y=cy+ballRadius*Math.sin(ballAngle);return{x,y}}function placeBall(angle,radius){const wrap=document.getElementById('wheel-wrap');const ball=document.getElementById('ball');const wSize=wrap.offsetWidth||320;const cx=wSize/2,cy=wSize/2;const bx=cx+radius*Math.cos(angle);const by=cy+radius*Math.sin(angle);ball.style.left=(bx-7)+'px';ball.style.top=(by-7)+'px';ball.style.position='absolute'}function doSpin(){if(spinning||selected.length<2){if(selected.length<2)alert('Please select at least 2 drinks!');return}if(mode==='three'&&round>=3)return;spinning=true;document.getElementById('spin-btn').disabled=true;document.getElementById('result-text').textContent='';const totalSpins=4+Math.random()*4;const duration=3000+Math.random()*1500;const start=performance.now();let wheelSpeed=0.08,ballSpeed=-0.25;const targetWheel=wheelAngle+(Math.PI*2*totalSpins);const targetBall=ballAngle-(Math.PI*2*(totalSpins*3));function animate(now){const elapsed=now-start;const progress=Math.min(elapsed/duration,1);const ease=1-Math.pow(1-progress,3);wheelAngle=wheelAngle+(targetWheel-wheelAngle)*0.015;ballAngle=ballAngle+(targetBall-ballAngle)*0.012;const currentBallRadius=130+Math.sin(progress*Math.PI)*20*(1-progress);placeBall(ballAngle,currentBallRadius);drawWheel();if(progress<1){animFrame=requestAnimationFrame(animate)}else{spinning=false;resolveSpin()}}requestAnimationFrame(animate)}function resolveSpin(){const sliceAngle=(Math.PI*2)/selected.length;let normalBall=((ballAngle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);let normalWheel=((wheelAngle%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);let relative=(normalBall-normalWheel+(Math.PI*2))%(Math.PI*2);let idx=Math.floor(relative/sliceAngle)%selected.length;if(idx<0)idx=0;const winnerId=selected[idx];const winner=ALL_DRINKS.find(d=>d.id===winnerId);placeBall(ballAngle,115);if(mode==='one'){currentWinner=winnerId;showFinalWinner(winner);document.getElementById('spin-btn').disabled=true}else{roundResults.push(winnerId);round++;updateRoundTracker();document.getElementById('round-label').textContent='Round '+round+' of 3';document.getElementById('result-text').textContent=winner.emoji+' '+winner.name+' wins Round '+round+'!';if(round>=3){const final=pickBestOfThree();currentWinner=final.id;setTimeout(()=>showFinalWinner(final),1200)}else{setTimeout(()=>{document.getElementById('spin-btn').disabled=false;document.getElementById('spin-btn').textContent='SPIN ROUND '+(round+1)},1200)}}}function pickBestOfThree(){const counts={};roundResults.forEach(id=>{counts[id]=(counts[id]||0)+1});let best=null,max=0;for(const id in counts){if(counts[id]>max){max=counts[id];best=id}}return ALL_DRINKS.find(d=>d.id===best)}function updateRoundTracker(){const tracker=document.getElementById('round-tracker');tracker.innerHTML='';for(let i=0;i<3;i++){const dot=document.createElement('div');dot.className='round-dot'+(i<roundResults.length?' win':' pending');tracker.appendChild(dot)}}function showFinalWinner(drink){const rev=document.getElementById('winner-reveal');document.getElementById('winner-name').textContent=drink.emoji+' '+drink.name;document.getElementById('winner-desc').textContent=drink.desc;rev.classList.add('show');document.getElementById('round-label').textContent='The House has spoken!';document.getElementById('result-text').textContent='Tonight you drink: '+drink.name}function resetGame(){round=0;roundResults=[];currentWinner=null;spinning=false;wheelAngle=0;ballAngle=0;document.getElementById('winner-reveal').classList.remove('show');document.getElementById('result-text').textContent='';document.getElementById('round-label').textContent='Choose your drinks and spin';document.getElementById('round-tracker').innerHTML='';document.getElementById('spin-btn').disabled=false;document.getElementById('spin-btn').textContent='SPIN';drawWheel();placeBall(Math.PI*1.5,130)}function openRecipe(id){const d=ALL_DRINKS.find(x=>x.id===id);if(!d)return;document.getElementById('m-name').textContent=d.emoji+' '+d.name;document.getElementById('m-desc').textContent=d.desc;document.getElementById('m-ing').innerHTML=d.ing.map(i=>'<li>'+i+'</li>').join('');document.getElementById('m-steps').innerHTML=d.steps.map(s=>'<li>'+s+'</li>').join('');document.getElementById('modal').classList.add('open')}function closeModal(){document.getElementById('modal').classList.remove('open')}document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal()});window.onload=function(){init();placeBall(Math.PI*1.5,130)}</script></body></html>
