<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatToDrink — Let Fate Decide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#d4af37;--gold2:#f4d976;--ink:#0b0b0e;--card:#15151b;--card2:#1c1c24;
  --line:rgba(212,175,55,0.18);--text:#e8e6df;--muted:#8a8a94;
}
html,body{background:var(--ink);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(212,175,55,0.10) 0,transparent 60%),
             radial-gradient(ellipse 50% 40% at 85% 85%,rgba(212,175,55,0.07) 0,transparent 60%);
  animation:drift 12s ease-in-out infinite alternate}
@keyframes drift{0%{opacity:.7}100%{opacity:1}}
h1,h2,h3{font-family:'Playfair Display',serif}
::selection{background:var(--gold);color:#000}

/* NAV */
.nav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;
  position:sticky;top:0;z-index:50;background:rgba(11,11,14,0.85);
  backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;letter-spacing:1px;cursor:pointer}
.logo span{color:var(--gold)}
.nav-links a{color:var(--muted);text-decoration:none;margin-left:28px;font-size:.72rem;
  font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:color .25s}
.nav-links a:hover{color:var(--gold)}
.screen{display:none;position:relative;z-index:1;min-height:calc(100vh - 73px)}
.screen.active{display:block}

/* HOME */
.hero{text-align:center;padding:100px 20px 40px}
.hero-tag{font-size:.7rem;font-weight:700;letter-spacing:4px;color:var(--gold);text-transform:uppercase;
  margin-bottom:18px;opacity:0;animation:fadeUp .6s .1s forwards}
.hero h1{font-size:clamp(2.6rem,8vw,5rem);line-height:1.05;font-weight:900;opacity:0;animation:fadeUp .6s .2s forwards}
.hero h1 em{font-style:normal;color:var(--gold);display:block;
  background:linear-gradient(90deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{color:var(--muted);margin-top:20px;font-size:1rem;max-width:480px;
  margin-inline:auto;opacity:0;animation:fadeUp .6s .3s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
.cta-wrap{display:flex;justify-content:center;padding:50px 20px 30px;opacity:0;animation:fadeUp .6s .4s forwards}
.cta{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;border:none;
  padding:20px 52px;border-radius:100px;font-size:1rem;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;transition:all .25s;box-shadow:0 12px 40px rgba(212,175,55,0.25)}
.cta:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 18px 50px rgba(212,175,55,0.4)}
.how-it-works{max-width:720px;margin:0 auto;padding:20px 20px 90px;display:grid;
  grid-template-columns:repeat(3,1fr);gap:16px;opacity:0;animation:fadeUp .6s .5s forwards}
.hiw-card{background:var(--card);border:1px solid var(--line);border-radius:18px;
  padding:26px 18px;text-align:center;transition:transform .25s,border-color .25s}
.hiw-card:hover{transform:translateY(-4px);border-color:rgba(212,175,55,0.5)}
.hiw-num{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.6rem;font-weight:900;margin-bottom:8px}
.hiw-card p{color:var(--muted);font-size:.82rem;line-height:1.5}

/* PICK */
.pick-wrap{max-width:820px;margin:0 auto;padding:60px 24px 40px}
.pick-header{text-align:center;margin-bottom:36px}
.step-pill{display:inline-block;background:rgba(212,175,55,0.12);color:var(--gold);
  padding:5px 16px;border-radius:100px;font-size:.68rem;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.pick-header h2{font-size:1.9rem;font-weight:800}
.pick-header p{color:var(--muted);margin-top:8px;font-size:.9rem}
.counter{color:var(--gold);font-weight:700}
.chip-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:40px}
.chip{background:var(--card);border:2px solid var(--line);border-radius:20px;
  padding:22px 14px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.chip .emoji{font-size:2.2rem;display:block;margin-bottom:8px;transition:transform .2s}
.chip .name{font-size:.85rem;font-weight:700}
.chip:hover{transform:translateY(-3px);border-color:rgba(212,175,55,0.4)}
.chip.selected{border-color:var(--gold);background:rgba(212,175,55,0.08)}
.chip.selected .emoji{transform:scale(1.15)}
.chip.selected::after{content:'✓';position:absolute;top:10px;right:12px;color:var(--gold);font-weight:900;font-size:.9rem}
.pick-actions{display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted);
  padding:14px 28px;border-radius:100px;font-size:.78rem;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;border:none;
  padding:14px 36px;border-radius:100px;font-size:.78rem;font-weight:800;
  letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-primary:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn-primary:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 12px 30px rgba(212,175,55,0.3)}

/* WHEEL */
.wheel-wrap{display:flex;flex-direction:column;align-items:center;padding:60px 20px 90px}
.wheel-title{text-align:center;margin-bottom:34px}
.wheel-title h2{font-size:1.8rem;font-weight:800}
.wheel-title p{color:var(--muted);margin-top:6px;font-size:.88rem}
.wheel-stage{position:relative;width:min(340px,80vw);height:min(340px,80vw);margin-bottom:34px}
.wheel-pointer{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;
  border-top:24px solid var(--gold);z-index:5;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4))}
#wheelCanvas{width:100%;height:100%;border-radius:50%;
  box-shadow:0 0 0 6px var(--card2),0 0 0 8px var(--line),0 20px 60px rgba(0,0,0,0.6)}
.wheel-hub{position:absolute;top:50%;left:50%;width:54px;height:54px;
  background:radial-gradient(circle,var(--gold2),var(--gold));border-radius:50%;
  transform:translate(-50%,-50%);box-shadow:0 4px 14px rgba(0,0,0,0.5);
  z-index:4;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
.spin-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#111;border:none;
  padding:18px 50px;border-radius:100px;font-size:.9rem;font-weight:800;letter-spacing:1.5px;
  text-transform:uppercase;cursor:pointer;transition:all .25s;box-shadow:0 12px 36px rgba(212,175,55,0.3)}
.spin-btn:hover:not(:disabled){transform:translateY(-3px) scale(1.03)}
.spin-btn:disabled{opacity:.4;cursor:not-allowed}

/* RESULT */
.result-wrap{max-width:480px;margin:0 auto;padding:70px 24px 90px;text-align:center;animation:popIn .4s ease}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.result-card{background:var(--card);border:1px solid var(--line);border-radius:28px;
  padding:46px 34px;position:relative;overflow:hidden}
.result-card::before{content:'';position:absolute;top:-40px;left:-20px;width:140%;height:140%;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,0.12),transparent 60%);pointer-events:none}
.result-tag{color:var(--gold);font-size:.7rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;margin-bottom:16px}
.result-emoji{font-size:4.2rem;margin-bottom:12px;display:block;filter:drop-shadow(0 8px 18px rgba(212,175,55,0.3))}
.result-card h2{font-size:2rem;font-weight:900;margin-bottom:10px}
.result-glass{color:var(--muted);font-size:.8rem;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:22px}
.result-desc{color:#b8b6ae;font-size:.92rem;line-height:1.7;margin-bottom:26px}
.result-actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal-box{background:var(--card2);border:1px solid var(--line);border-radius:24px;
  max-width:440px;width:100%;max-height:82vh;overflow-y:auto;padding:36px 30px;animation:popIn .3s ease;position:relative}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;
  color:var(--muted);font-size:1.4rem;cursor:pointer}
.r-section{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:12px}
.r-section h3{color:var(--gold);font-size:.62rem;text-transform:uppercase;letter-spacing:2.5px;margin-bottom:10px;font-weight:700;font-family:'Inter',sans-serif}
.r-section ul{list-style:none}
.r-section ul li{padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);color:#c9c7c0;font-size:.85rem;display:flex;gap:8px;align-items:center}
.r-section ul li::before{content:'';width:5px;height:5px;background:var(--gold);border-radius:50%;flex-shrink:0}
.r-section ul li:last-child{border-bottom:none}
.r-section p{color:#a8a6a0;line-height:1.7;font-size:.85rem}
button:focus-visible,.chip:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
@media(max-width:520px){.nav-links{display:none}.how-it-works{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo" onclick="goHome()">WHAT<span>TO</span>DRINK</div>
  <div class="nav-links">
    <a onclick="goHome()">Home</a>
    <a onclick="goPick()">Pick Drinks</a>
  </div>
