<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatDrinkToday</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', sans-serif;
      color: #f0f0f0;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 40px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 36px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      min-height: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .emoji {
      font-size: 3.5rem;
      margin-bottom: 16px;
      display: block;
    }

    .drink-name {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .drink-type {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #f5a623;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .drink-desc {
      color: #aaa;
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .drink-price {
      font-size: 0.85rem;
      color: #5a5;
      font-weight: 600;
    }

    .placeholder {
      color: #444;
      font-size: 1rem;
    }

    .btn {
      margin-top: 32px;
      background: #f5a623;
      color: #000;
      border: none;
      padding: 16px 48px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .btn:hover { background: #e09510; }
    .btn:active { transform: scale(0.97); }

    .again-btn {
      margin-top: 12px;
      background: transparent;
      color: #666;
      border: 1px solid #333;
      padding: 10px 28px;
      font-size: 0.85rem;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .again-btn:hover { border-color: #666; color: #aaa; }

    .buttons { display: flex; flex-direction: column; align-items: center; gap: 0; }

    footer {
      margin-top: 48px;
      color: #333;
      font-size: 0.75rem;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>WhatDrinkToday</h1>
  <p class="subtitle">Let fate decide. Spoons edition.</p>

  <div class="card" id="card">
    <p class="placeholder">Hit the button and see what you're having.</p>
  </div>

  <div class="buttons">
    <button class="btn" id="spinBtn" onclick="spinDrink()">Spin a Drink</button>
    <button class="again-btn" id="againBtn" onclick="spinDrink()" style="display:none">Try another one</button>
  </div>

  <footer>Drinks from the Wetherspoons menu &mdash; prices approximate &middot; <a href="https://www.jdwetherspoon.com" style="color:#444" target="_blank">jdwetherspoon.com</a></footer>

  <script>
    const DRINKS = [
      { name: 'Espresso Martini', emoji: '☕', type: 'Classic Cocktail', desc: 'Vodka, 100% Brazilian Arabica coffee, coffee liqueur. Silky and bold.', price: 'From ~£5.99' },
      { name: 'Strawberry Daiquiri', emoji: '🍓', type: 'Classic Cocktail', desc: 'White rum, pressed lime, sugar, strawberry liqueur and purée.', price: 'From ~£5.99' },
      { name: "Tommy's Margarita", emoji: '🍋', type: 'Classic Cocktail', desc: 'Blanco tequila, fresh lime juice, agave syrup. Clean and sharp.', price: 'From ~£5.99' },
      { name: 'Amaretto Sour', emoji: '🌸', type: 'Classic Cocktail', desc: 'Amaretto, pressed lemon, bitters, sugar. Served with lemon.', price: 'From ~£5.99' },
      { name: 'Mango Picante', emoji: '🤭', type: 'Classic Cocktail', desc: 'Absolut Mango, pineapple, papaya, lemon, agave, chilli. Sweet heat.', price: 'From ~£5.99' },
      { name: 'Paloma', emoji: '🍺', type: 'Classic Cocktail', desc: 'Jose Cuervo tequila, pink grapefruit syrup, soda. Light and citrusy.', price: 'From ~£5.99' },
      { name: 'Long Island Iced Tea', emoji: '🧊', type: 'Classic Cocktail', desc: 'Vodka, rum, gin, tequila, triple sec, lemon, cola. No further questions.', price: 'From ~£5.99' },
      { name: 'Blue Lagoon', emoji: '💙', type: 'Classic Cocktail', desc: 'Blue Curaçao, Smirnoff vodka, lime cordial, lemonade. Bright blue.', price: 'From ~£5.99' },
      { name: 'Porn Star Martini', emoji: '⭐', type: 'Classic Cocktail', desc: 'Absolut Vanilia, mango, passion fruit, orange, lemonade.', price: 'From ~£5.99' },
      { name: 'Woo Woo', emoji: '🍑', type: 'Classic Cocktail', desc: 'Smirnoff vodka, Archers peach schnapps, cranberry juice. Easy drinking.', price: 'From ~£5.99' },
      { name: 'Sex on the Beach', emoji: '🏖️', type: 'Classic Cocktail', desc: 'Smirnoff vodka, peach schnapps, cranberry and orange juice.', price: 'From ~£5.99' },
      { name: 'Classic Aperol Spritz', emoji: '🍊', type: 'Spritz', desc: 'Aperol 50ml, Prosecco 125ml, soda. Served with orange.', price: 'From ~£5.99' },
      { name: 'Hugo Spritz', emoji: '🌿', type: 'Spritz', desc: 'Tanqueray gin, Prosecco, soda, elderflower cordial, lime and mint.', price: 'From ~£10.45' },
      { name: 'Peach Blush Spritz', emoji: '🍑', type: 'Spritz', desc: 'Archers peach schnapps, rosé wine, lemonade. Light and fruity.', price: 'From ~£9.99' },
      { name: 'Limoncello Spritz', emoji: '🍋', type: 'Spritz', desc: 'Limoncello 50ml, Prosecco 125ml, soda. Sharp and refreshing.', price: 'From ~£5.99' },
      { name: 'Mango & Passionfruit Spritz', emoji: '🥭', type: 'Spritz', desc: 'Smirnoff Mango & Passionfruit vodka, Prosecco, lemonade.', price: 'From ~£13.50' },
      { name: 'Pimm\'s Sundowner Spritz', emoji: '🌷', type: 'Spritz', desc: 'Pimm\'s, Prosecco, lemonade. Classic summer in a glass.', price: 'From ~£5.99' },
      { name: 'Tropical Smash', emoji: '🌴', type: 'Classic Cocktail', desc: 'Watermelon liqueur, Jack Daniel\'s Tennessee Apple, pineapple, orange.', price: 'From ~£5.99' },
      { name: 'Zombie', emoji: '🧹', type: 'Classic Cocktail', desc: 'Kraken spiced rum, Captain Morgan White, pineapple, orange, lemon juice.', price: 'From ~£5.99' },
      { name: 'Passion Fruit Cooler', emoji: '🌶️', type: 'Mocktail', desc: 'Orange juice, mango and passion fruit with lemonade. Alcohol-free.', price: 'From ~£3.50' }
    ];

    function spinDrink() {
      const drink = DRINKS[Math.floor(Math.random() * DRINKS.length)];
      const card = document.getElementById('card');
      card.innerHTML = `
        <span class="emoji">${drink.emoji}</span>
        <div class="drink-type">${drink.type}</div>
        <div class="drink-name">${drink.name}</div>
        <div class="drink-desc">${drink.desc}</div>
        <div class="drink-price">${drink.price}</div>
      `;
      document.getElementById('againBtn').style.display = 'inline-block';
    }
  </script>

</body>
</html>
