<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>What Drink Today?</title><style>*{margin:0;padding:0;box-sizing:border-box}body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:'Segoe UI',sans-serif;color:#fff;overflow-x:hidden}.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite alternate}.hero{position:relative;z-index:1;text-align:center;padding:60px 20px 30px}.hero h1{font-size:3rem;font-weight:900;background:linear-gradient(90deg,#f7971e,#ffd200,#f7971e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:2px;animation:glow 2s ease-in-out infinite alternate}.hero p{margin-top:10px;font-size:1.1rem;color:#ccc;letter-spacing:1px}.tagline{font-style:italic;color:#ffd200;font-size:.95rem;margin-top:6px}.mode-select{display:flex;justify-content:center;gap:16px;margin-bottom:30px;flex-wrap:wrap}.mode-btn{padding:12px 28px;border:2px solid #ffd200;background:transparent;color:#ffd200;border-radius:30px;cursor:pointer;font-size:1rem;font-weight:700;transition:all .3s}.mode-btn:hover,.mode-btn.active{background:#ffd200;color:#000}.drink-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,215,0,.2);border-radius:20px;padding:30px 24px;width:220px;text-align:center;cursor:pointer;transition:transform .3s,box-shadow .3s}.drink-card:hover{transform:translateY(-8px);box-shadow:0 20px 40px rgba(255,215,0,.2)}.drink-card .emoji{font-size:3.5rem;margin-bottom:12px}.drink-card h3{font-size:1.2rem;font-weight:700;margin-bottom:6px;color:#ffd200}.drink-card p{font-size:.85rem;color:#bbb;margin-bottom:14px}.vote-btn{background:linear-gradient(135deg,#f7971e,#ffd200);border:none;color:#000;font-weight:700;padding:10px 22px;border-radius:20px;cursor:pointer;font-size:.9rem;width:100%}.vote-btn:disabled{opacity:.4;cursor:not-allowed}.vs-wrap{display:flex;justify-content:center;align-items:center;gap:30px;flex-wrap:wrap;padding:20px}.vs-text{font-size:2rem;font-weight:900;color:#ffd200;animation:pulse 1.5s ease-in-out infinite}.lbv{display:flex;justify-content:center;align-items:center;gap:12px;margin-top:8px}.lbv span{font-size:1.4rem;font-weight:800;color:#ffd200}.dreset{text-align:center;padding:10px;color:#aaa;font-size:.85rem}.section{position:relative;z-index:1;max-width:900px;margin:40px auto;padding:0 20px}.section h2{text-align:center;font-size:1.8rem;color:#ffd200;margin-bottom:24px}.lb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}.lb-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.15);border-radius:16px;padding:20px;text-align:center}.lb-card .rank{font-size:2rem;margin-bottom:6px}.lb-card h4{color:#ffd200;font-size:1rem;margin-bottom:4px}.lb-card p{color:#999;font-size:.85rem}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:100;justify-content:center;align-items:center;padding:20px}.modal.open{display:flex}.modal-box{background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid rgba(255,215,0,.3);border-radius:24px;padding:36px;max-width:480px;width:100%;position:relative;max-height:85vh;overflow-y:auto}.modal-box h2{color:#ffd200;font-size:1.6rem;margin-bottom:6px}.close-btn{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:1.6rem;cursor:pointer}.modal-box h3{color:#f7971e;margin:16px 0 8px}.modal-box ul{padding-left:20px;color:#ccc;line-height:1.7}.modal-box p{color:#bbb;line-height:1.7}.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f7971e,#ffd200);color:#000;font-weight:700;padding:14px 28px;border-radius:30px;z-index:200;opacity:0;transition:opacity .4s;pointer-events:none}.toast.show{opacity:1}#app{position:relative;z-index:1;padding:20px}footer{position:relative;z-index:1;text-align:center;padding:30px 20px;color:#666;font-size:.85rem}@keyframes twinkle{0%{opacity:.2}100%{opacity:1}}@keyframes glow{0%{filter:brightness(1)}100%{filter:brightness(1.3)}}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}</style></head><body><div class="stars" id="stars"></div><div class="hero"><h1>What Drink Today?</h1><p>Discover your next favourite drink</p><p class="tagline">Play for the love of the game</p></div><div id="app"><div class="mode-select"><button class="mode-btn active" onclick="setMode('1')">Best of One</button><button class="mode-btn" onclick="setMode('3')">Best of Three</button></div><div class="dreset" id="dreset"></div><div id="modewrap"></div></div><div class="section"><h2>Leaderboard</h2><div class="lb-grid" id="lblist"></div></div><div class="modal" id="modal"><div class="modal-box"><button class="close-btn" onclick="closeModal()">x</button><h2 id="mname"></h2><p id="mdesc"></p><h3>Ingredients</h3><ul id="mingr"></ul><h3>How to Make</h3><p id="msteps"></p></div></div><div class="toast" id="toast"></div><footer>Play for the love of the game | whatdrinktoday</footer><script>const D=[{id:'mojito',name:'Mojito',e:'­¤Źā',d:'Refreshing Cuban classic',i:['60ml white rum','30ml lime juice','2 tsp sugar','Mint leaves','Soda water','Ice'],s:'Muddle mint with sugar and lime. Add rum and ice. Top with soda water.'},{id:'margarita',name:'Margarita',e:'­¤Źŗ',d:'Tequila perfection',i:['50ml tequila','25ml triple sec','25ml lime juice','Salt rim','Ice'],s:'Salt the rim. Shake all with ice. Strain into glass.'},{id:'old_fashioned',name:'Old Fashioned',e:'­¤źā',d:'Timeless classic',i:['60ml bourbon','1 sugar cube','2 dashes bitters','Orange peel','Ice'],s:'Muddle sugar with bitters. Add bourbon and large ice cube. Stir and garnish.'},{id:'pina_colada',name:'Pina Colada',e:'­¤ŹŹ',d:'Tropical paradise',i:['60ml white rum','60ml coconut cream','120ml pineapple juice','Ice'],s:'Blend all with ice until smooth. Garnish with pineapple.'},{id:'gin_tonic',name:'Gin & Tonic',e:'­¤½¦',d:'Crisp and refreshing',i:['50ml gin','150ml tonic water','Lime wedge','Ice'],s:'Fill glass with ice. Add gin. Top with tonic. Squeeze lime.'},{id:'daiquiri',name:'Daiquiri',e:'­¤Źō',d:'Simple and sublime',i:['60ml white rum','30ml lime juice','15ml simple syrup','Ice'],s:'Shake all hard with ice. Double strain into chilled coupe.'},{id:'espresso_martini',name:'Espresso Martini',e:'ŌśĢ',d:'Coffee lover delight',i:['50ml vodka','25ml coffee liqueur','30ml espresso','Ice'],s:'Shake all hard with ice. Strain into martini glass. Top 3 coffee beans.'},{id:'negroni',name:'Negroni',e:'­¤ŹŖ',d:'Bold Italian aperitivo',i:['30ml gin','30ml sweet vermouth','30ml Campari','Orange peel','Ice'],s:'Stir all with ice. Strain into rocks glass. Garnish with orange.'},{id:'cosmopolitan',name:'Cosmopolitan',e:'­¤īĖ',d:'Chic and stylish',i:['40ml vodka','15ml triple sec','30ml cranberry juice','15ml lime juice','Ice'],s:'Shake all with ice. Strain into chilled martini glass.'},{id:'aperol_spritz',name:'Aperol Spritz',e:'­¤¤Ā',d:'Italian sunshine',i:['90ml prosecco','60ml Aperol','Splash soda','Orange slice','Ice'],s:'Fill with ice. Add Aperol then prosecco. Splash soda. Garnish.'},{id:'moscow_mule',name:'Moscow Mule',e:'­¤½Ü',d:'Zingy and bold',i:['60ml vodka','120ml ginger beer','15ml lime juice','Lime wedge','Ice'],s:'Fill copper mug with ice. Add vodka and lime. Top with ginger beer.'},{id:'manhattan',name:'Manhattan',e:'­¤ŹÆ',d:'New York classic',i:['60ml rye whiskey','30ml sweet vermouth','2 dashes bitters','Cherry'],s:'Stir all with ice. Strain into chilled glass. Garnish with cherry.'}];let mode='1',round=0,sc={a:0,b:0},picks=[];function gv(){return JSON.parse(localStorage.getItem('wdt_v')||'{}');}function sv(v){localStorage.setItem('wdt_v',JSON.stringify(v));}function today(){return new Date().toISOString().slice(0,10);}function voted(){return gv()[today()]===true;}function markVoted(){let v=gv();v[today()]=true;sv(v);}function gs(){return JSON.parse(localStorage.getItem('wdt_s')||'{}');}function addS(id){let s=gs();s[id]=(s[id]||0)+1;localStorage.setItem('wdt_s',JSON.stringify(s));}function shuffle(a){let r=[...a];for(let i=r.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}function setMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');startGame();}function startGame(){picks=shuffle(D);round=0;sc={a:0,b:0};showRound();}function showRound(){let w=document.getElementById('modewrap');document.getElementById('dreset').innerHTML=voted()?'One vote per day. Come back tomorrow!':'';if(mode==='1'){let t=picks.slice(0,2);w.innerHTML=matchHTML(t[0],t[1]);}else{if(round>=3){showWinner();return;}let t=picks.slice(round*2,round*2+2);w.innerHTML='<div style="color:#ffd200;font-size:1.1rem;margin-bottom:16px;font-weight:700;">Round '+(round+1)+' of 3</div>'+matchHTML(t[0],t[1]);}renderLB();}function matchHTML(a,b){return '<div class="vs-wrap">'+cardHTML(a)+' <span class="vs-text">VS</span> '+cardHTML(b)+'</div><div style="text-align:center;margin-top:16px;"><button onclick="startGame()" style="padding:10px 24px;background:transparent;border:2px solid #666;color:#999;border-radius:20px;cursor:pointer;">Shuffle Again</button></div>';}function cardHTML(d){let v=voted();let s=gs();return '<div class="drink-card" onclick="openR(\"'+d.id+'\")">'+'<div class="emoji">'+d.e+'</div>'+'<h3>'+d.name+'</h3>'+'<p>'+d.d+'</p>'+'<button class="vote-btn"'+(v?' disabled':'')+' onclick="event.stopPropagation();vote(\"'+d.id+'\")">'+( v?'Voted':'Vote for this')+'</button>'+'<div class="lbv"><span>'+(s[d.id]||0)+'</span><small style="color:#999;">votes</small></div></div>';}function vote(id){if(voted()){toast('One vote per day!');return;}markVoted();addS(id);let d=D.find(x=>x.id===id);toast('Voted for '+d.name+'!');if(mode==='3'){round++;sc.a++;}showRound();}function showWinner(){let w=document.getElementById('modewrap');let msg=sc.a>sc.b?'You win!':sc.a<sc.b?'Tough luck!':'Draw!';w.innerHTML='<div style="text-align:center;padding:40px 20px;"><div style="font-size:4rem">­¤Åå</div><h2 style="color:#ffd200;font-size:2rem;margin:12px 0;">'+msg+'</h2><p style="color:#ccc;margin-bottom:24px;">Final: You '+sc.a+' - '+sc.b+' Computer</p><button onclick="startGame()" style="padding:14px 32px;background:linear-gradient(135deg,#f7971e,#ffd200);border:none;color:#000;font-weight:700;border-radius:24px;cursor:pointer;font-size:1rem;">Play Again</button></div>';}function openR(id){let d=D.find(x=>x.id===id);document.getElementById('mname').textContent=d.e+' '+d.name;document.getElementById('mdesc').textContent=d.d;document.getElementById('mingr').innerHTML=d.i.map(x=>'<li>'+x+'</li>').join('');document.getElementById('msteps').textContent=d.s;document.getElementById('modal').classList.add('open');}function closeModal(){document.getElementById('modal').classList.remove('open');}function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}function renderLB(){let s=gs();let sorted=D.slice().sort((a,b)=>(s[b.id]||0)-(s[a.id]||0));let m=['­¤źć','­¤źł','­¤źē'];document.getElementById('lblist').innerHTML=sorted.map((d,i)=>'<div class="lb-card"><div class="rank">'+(m[i]||'­¤Ź╣')+'</div><h4>'+d.name+'</h4><p>'+(s[d.id]||0)+' votes</p></div>').join('');}(function(){let c=document.getElementById('stars');for(let i=0;i<80;i++){let s=document.createElement('div');s.className='star';let z=Math.random()*3+1;s.style.cssText='width:'+z+'px;height:'+z+'px;top:'+Math.random()*100+'%;left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*4+2)+'s;animation-delay:'+(Math.random()*3)+'s;';c.appendChild(s);}})();startGame();</script></body></html>
